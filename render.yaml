services:
  - type: web
    name: omnisensus-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --timeout 60 --bind 0.0.0.0:$PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ML_API_URL
        value: https://omnisensus-ml-model.onrender.com
      - key: ML_API_KEY
        sync: false
      - key: API_KEY
        sync: false
      - key: DOCS_USERNAME
        sync: false
      - key: DOCS_PASSWORD
        sync: false
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11.9"
